<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head>
    <title>내 정보</title>
    <th:block layout:fragment="css">
        <link rel="stylesheet" th:href="@{/css/mypage.css}">
    </th:block>
</head>
<body>
    <main layout:fragment="content">
        <section class="mypage-section" id="mypage-section">
            <h1 class="mypage-title" id="mypage-title">내 정보</h1>

            <form th:action="@{/mypage}" method="post" class="mypage-form" id="mypage-form">
                <!-- 개인정보 -->
                <div class="info-section" id="info-personal">
                    <h2 class="info-section-title">개인정보</h2>

                    <div class="info-row" id="info-email">
                        <div class="info-label">이메일</div>
                        <div class="info-field">
                            <span class="info-value" id="info-email-value" th:text="${user?.maskedEmail ?: 'gia*******@gmail.com'}">gia*******@gmail.com</span>
                        </div>
                    </div>

                    <div class="info-row" id="info-name">
                        <div class="info-label">이름</div>
                        <div class="info-field">
                            <span class="info-value" id="info-name-value" th:text="${user?.name ?: '박경화'}">박경화</span>
                            <button type="button" class="info-edit-btn" id="btn-edit-name">변경</button>
                        </div>
                    </div>

                    <div class="info-row" id="info-password">
                        <div class="info-label">비밀번호</div>
                        <div class="info-field">
                            <span class="info-value info-value-action" id="info-password-value">비밀번호 설정</span>
                            <button type="button" class="info-edit-btn" id="btn-edit-password">설정</button>
                        </div>
                    </div>

                    <div class="info-row" id="info-phone">
                        <div class="info-label">전화번호</div>
                        <div class="info-field">
                            <span class="info-value info-value-action" id="info-phone-value" th:text="${user?.phone ?: '전화번호 설정'}">전화번호 설정</span>
                            <button type="button" class="info-edit-btn" id="btn-edit-phone">설정</button>
                        </div>
                    </div>
                </div>

                <!-- 배송지 -->
                <div class="info-section" id="info-shipping">
                    <h2 class="info-section-title">배송지</h2>

                    <div class="info-row" id="info-address">
                        <div class="info-label">주소</div>
                        <div class="info-field">
                            <span class="info-value info-value-action" id="info-address-value" th:text="${user?.address ?: '주소 설정'}">주소 설정</span>
                            <button type="button" class="info-edit-btn" id="btn-edit-address">설정</button>
                        </div>
                    </div>
                </div>

                <!-- 저장 버튼 -->
                <div class="mypage-actions" id="mypage-actions">
                    <button type="submit" class="mypage-save-btn" id="mypage-save-btn">저장</button>
                </div>
            </form>
        </section>
    </main>

    <th:block layout:fragment="scripts">
        <script th:src="@{/js/mypage.js}"></script>
    </th:block>
</body>
</html>
