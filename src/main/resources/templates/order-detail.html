<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head>
    <title>주문 상세</title>
    <th:block layout:fragment="css">
        <link rel="stylesheet" th:href="@{/css/order-detail.css}">
    </th:block>
</head>
<body>
    <main layout:fragment="content">
        <section class="order-detail-section" id="order-detail-section">

            <!-- 주문 기본 정보 -->
            <div class="order-detail-header" id="order-detail-header">
                <div class="order-detail-meta">
                    <p class="order-detail-date">주문 날짜 : <span id="detail-order-date"></span></p>
                    <p class="order-detail-number">주문 번호 : <span id="detail-order-number"></span></p>
                    <div style="margin-top: 8px;">
                        <span id="detail-order-status" style="background: #1a1a1a; color: white; padding: 4px 10px; border-radius: 4px; font-size: 13px; font-weight: 500; display: inline-block;"></span>
                    </div>
                </div>
                <button class="btn-cancel-order" id="btn-cancel-order">취소</button>
            </div>

            <!-- 배송 아이템 목록 -->
            <div class="delivery-items" id="delivery-items">
                <!-- JS 렌더링 영역 -->
            </div>

            <!-- 총 주문 금액 -->
            <div class="order-total-bar" id="order-total-bar">
                <span class="order-total-label">총 결제 금액:</span>
                <span class="order-total-value" id="order-total-value">
                    0원
                </span>
            </div>

            <!-- 주문자 정보 -->
            <div class="detail-info-block" id="order-recipient-info">
                <h2 class="detail-info-title">주문자 정보</h2>
                <div class="detail-info-table">
                    <div class="detail-info-row">
                        <span class="detail-info-label">받는 사람</span>
                        <span class="detail-info-value" id="recipient-name"></span>
                    </div>
                    <div class="detail-info-row">
                        <span class="detail-info-label">연락처</span>
                        <span class="detail-info-value" id="recipient-phone"></span>
                    </div>
                    <div class="detail-info-row">
                        <span class="detail-info-label">배송지</span>
                        <span class="detail-info-value" id="recipient-address"></span>
                    </div>
                </div>
            </div>

            <!-- 결제 정보 -->
            <div class="detail-info-block" id="order-payment-info">
                <h2 class="detail-info-title">결제 정보</h2>
                <div class="detail-info-table">
                    <div class="detail-info-row">
                        <span class="detail-info-label">결제 수단</span>
                        <span class="detail-info-value" id="payment-method">카카오페이</span>
                    </div>
                </div>
                <div class="payment-summary" id="payment-summary">
                    <div class="payment-summary-row">
                        <span>총 상품 가격</span>
                        <span id="payment-product-total">
                            0 원
                        </span>
                    </div>
                    <div class="payment-summary-row">
                        <span>배송비</span>
                        <span id="payment-shipping-fee">
                            0 원
                        </span>
                    </div>
                    <div class="payment-summary-row payment-summary-total">
                        <span>총 결제 금액</span>
                        <span id="payment-grand-total">
                            0 원
                        </span>
                    </div>
                </div>
            </div>
        </section>
    </main>
    
    <th:block layout:fragment="scripts">
        <script th:src="@{/js/order-detail.js}"></script>
    </th:block>
</body>
</html>
