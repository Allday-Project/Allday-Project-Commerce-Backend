<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="ALLDAY PROJECT 로그인">
    <title>로그인 - ADP</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/login.css}">
</head>
<body class="login-body">
    <div class="login-container" id="login-container">
        <!-- 로고 -->
        <a th:href="@{/}" class="login-logo" id="login-logo">
            <span class="logo-text logo-text-large">ADP</span>
        </a>

        <h1 class="login-title" id="login-title">로그인</h1>

        <!-- 에러 메시지 -->
        <div class="login-error" id="login-error" th:if="${error}" th:text="${error}"></div>

        <!-- 로그인 폼 -->
        <form class="login-form" id="login-form">
            <div class="form-group" id="form-group-email">
                <label for="email" class="form-label">이메일</label>
                <input type="email" id="email" name="email" class="form-input" required autocomplete="email">
            </div>
            <div class="form-group" id="form-group-password">
                <label for="password" class="form-label">비밀번호</label>
                <input type="password" id="password" name="password" class="form-input" required autocomplete="current-password">
            </div>
            <button type="submit" class="login-btn" id="login-submit-btn">로그인</button>
            <p class="signup-prompt" id="signup-prompt">
                ADP는 처음이신가요? <a th:href="@{/signup}" class="signup-link" id="signup-prompt-link">회원가입</a>
            </p>
        </form>

        <!-- 소셜 로그인 구분선 -->
        <div class="social-divider" id="social-divider"></div>

        <!-- 소셜 로그인 -->
        <div class="social-login" id="social-login">
            <a th:href="@{/oauth2/authorization/google}" class="social-btn social-btn-google" id="google-login-btn">
                <svg class="social-icon" width="20" height="20" viewBox="0 0 24 24">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                </svg>
                <span>구글로 로그인</span>
            </a>
            <a th:href="@{/oauth2/authorization/kakao}" class="social-btn social-btn-kakao" id="kakao-login-btn">
                <svg class="social-icon" width="20" height="20" viewBox="0 0 24 24">
                    <circle cx="12" cy="12" r="10" fill="#3C1E1E"/>
                </svg>
                <span>카카오 로그인</span>
            </a>
        </div>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const errorEl = document.getElementById('login-error');
            const submitBtn = document.getElementById('login-submit-btn');

            if (!email || !password) {
                if (errorEl) {
                    errorEl.textContent = '이메일과 비밀번호를 입력해주세요.';
                    errorEl.style.display = 'block';
                }
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = '로그인 중...';

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    credentials: 'include',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                if (res.ok) {
                    window.location.href = '/';
                } else {
                    const json = await res.json().catch(() => null);
                    const msg = json?.data?.message || '이메일 또는 비밀번호가 올바르지 않습니다.';
                    if (errorEl) {
                        errorEl.textContent = msg;
                        errorEl.style.display = 'block';
                    }
                }
            } catch (err) {
                if (errorEl) {
                    errorEl.textContent = '서버 연결에 실패했습니다.';
                    errorEl.style.display = 'block';
                }
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = '로그인';
            }
        });
    </script>
</body>
</html>
