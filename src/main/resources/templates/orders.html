<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head>
    <title>주문내역</title>
    <th:block layout:fragment="css">
        <link rel="stylesheet" th:href="@{/css/orders.css}">
    </th:block>
</head>
<body>
    <main layout:fragment="content">
        <section class="orders-section" id="orders-section">
            <h1 class="orders-title" id="orders-title">주문내역</h1>

            <div class="orders-filter-tabs" style="display: flex; gap: 8px; margin-bottom: 24px;">
                <button class="filter-tab active" data-filter="all" style="padding: 8px 16px; border: 1px solid #1a1a1a; background: #1a1a1a; color: white; border-radius: 4px; cursor: pointer; font-size: 14px;">전체</button>
                <button class="filter-tab" data-filter="PENDING_PAYMENT" style="padding: 8px 16px; border: 1px solid #ccc; background: white; color: #666; border-radius: 4px; cursor: pointer; font-size: 14px;">결제 대기</button>
                <button class="filter-tab" data-filter="CONFIRMED" style="padding: 8px 16px; border: 1px solid #ccc; background: white; color: #666; border-radius: 4px; cursor: pointer; font-size: 14px;">구매 확정</button>
                <button class="filter-tab" data-filter="REFUNDED" style="padding: 8px 16px; border: 1px solid #ccc; background: white; color: #666; border-radius: 4px; cursor: pointer; font-size: 14px;">환불</button>
            </div>

            <!-- 주문 그룹 반복 -->
            <div class="order-groups" id="order-groups">
                <div class="order-list" id="order-list-container">
                    <!-- 주문 내역이 자바스크립트에 의해 동적으로 렌더링됩니다. -->
                </div>
                
                <div id="order-loading" style="text-align: center; padding: 20px; color: #666; display: none;">
                    주문 내역을 불러오는 중입니다...
                </div>
            </div>
        </section>
    </main>

    <th:block layout:fragment="scripts">
        <script th:src="@{/js/orders.js}"></script>
    </th:block>
</body>
</html>
