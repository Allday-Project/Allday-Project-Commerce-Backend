# Local 프로파일 설정 (개발자 로컬 환경 - H2 인메모리 DB)
spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:file:~/testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        format_sql: true
        show_sql: false
    defer-datasource-initialization: true

logging:
  level:
    root: info
    com:
      example:
        alldayprojectcommerce: debug
    org:
      hibernate:
        SQL: debug
        type:
          descriptor:
            sql: trace