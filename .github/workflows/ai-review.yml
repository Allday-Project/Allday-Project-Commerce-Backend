name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch previous AI reviews
        id: prev-reviews
        if: github.event.action == 'synchronize'
        uses: actions/github-script@v7
        with:
          script: |
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              per_page: 100
            });
            const botReviews = comments.data
              .filter(c => c.user.type === 'Bot' && c.body.includes('AI 코드리뷰'))
              .map(c => c.body
                .replace(/## 🤖 AI 코드리뷰\n?/, '')
                .replace(/\n---\n> \*AI 리뷰는.*$/, ''))
              .slice(-3);
            core.setOutput('reviews', JSON.stringify(botReviews));

      - name: Extract diff
        id: diff
        run: |
          git diff origin/${{ github.base_ref }}...HEAD | head -c 50000 > /tmp/review-diff.txt
          DIFF_SIZE=$(wc -c < /tmp/review-diff.txt)
          echo "size=$DIFF_SIZE" >> "$GITHUB_OUTPUT"

      - name: Check diff size
        id: check
        run: |
          if [ "${{ steps.diff.outputs.size }}" -lt 100 ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Request AI Review
        id: review
        if: steps.check.outputs.skip == 'false'
        env:
          REVIEW_SERVER_URL: ${{ secrets.REVIEW_SERVER_URL }}
          REVIEW_SECRET:     ${{ secrets.REVIEW_SECRET }}
          PR_TITLE:          ${{ github.event.pull_request.title }}
          PR_AUTHOR:         ${{ github.event.pull_request.user.login }}
          PR_REPO:           ${{ github.repository }}
          PR_NUM:            ${{ github.event.pull_request.number }}
          BASE_REF:          ${{ github.base_ref }}
          PREV_REVIEWS:      ${{ steps.prev-reviews.outputs.reviews }}
        run: |
          PAYLOAD=$(jq -n \
            --rawfile diff   /tmp/review-diff.txt \
            --arg pr_title    "$PR_TITLE" \
            --arg pr_author   "$PR_AUTHOR" \
            --arg repo        "$PR_REPO" \
            --argjson pr_num  "$PR_NUM" \
            --arg base        "$BASE_REF" \
            --arg previous_reviews "$PREV_REVIEWS" \
            '{diff:$diff, pr_title:$pr_title, pr_author:$pr_author, repo:$repo, pr_number:$pr_num, base_branch:$base, previous_reviews:$previous_reviews}')

          HTTP_RESPONSE=$(curl -s -w "\n%{http_code}" --max-time 90 \
            -X POST "${REVIEW_SERVER_URL}/review" \
            -H "Content-Type: application/json" \
            -H "x-review-secret: ${REVIEW_SECRET}" \
            -H "x-github-repo: ${PR_REPO}" \
            -d "$PAYLOAD")

          HTTP_BODY=$(echo "$HTTP_RESPONSE" | head -n -1)
          HTTP_CODE=$(echo "$HTTP_RESPONSE" | tail -n 1)

          if [ "$HTTP_CODE" != "200" ]; then
            echo "::warning::리뷰 서버 오류 (HTTP $HTTP_CODE)"
            echo "text=⚠️ 리뷰 서버 응답 오류 (HTTP ${HTTP_CODE})" >> "$GITHUB_OUTPUT"
          else
            REVIEW_TEXT=$(echo "$HTTP_BODY" | jq -r '.review // "리뷰 내용을 가져올 수 없습니다."')
            CHANGELOG_NOTICE=$(echo "$HTTP_BODY" | jq -r '.changelogNotice // empty')
            {
              echo "text<<REVIEW_EOF"
              echo "$REVIEW_TEXT"
              echo "REVIEW_EOF"
            } >> "$GITHUB_OUTPUT"
            if [ -n "$CHANGELOG_NOTICE" ]; then
              echo "changelog_notice<<CHANGELOG_EOF"
              echo "$CHANGELOG_NOTICE"
              echo "CHANGELOG_EOF"
            fi >> "$GITHUB_OUTPUT"
          fi

      - name: Post Review Comment
        if: steps.check.outputs.skip == 'false'
        uses: actions/github-script@v7
        env:
          REVIEW_TEXT: ${{ steps.review.outputs.text }}
          CHANGELOG_NOTICE: ${{ steps.review.outputs.changelog_notice }}
        with:
          script: |
            const parts = [
              "## 🤖 AI 코드리뷰"
            ];
            if (process.env.CHANGELOG_NOTICE) {
              parts.push("", process.env.CHANGELOG_NOTICE);
            }
            parts.push("", process.env.REVIEW_TEXT,
              "\n---",
              "> *AI 리뷰는 참고용입니다. 최종 판단은 팀원이 직접 합니다.*"
            );
            const body = parts.join("\n");
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body
            });

      - name: Request Rebuttal
        id: rebuttal
        if: steps.check.outputs.skip == 'false'
        continue-on-error: true
        env:
          REVIEW_SERVER_URL: ${{ secrets.REVIEW_SERVER_URL }}
          REVIEW_SECRET:     ${{ secrets.REVIEW_SECRET }}
          PR_REPO:           ${{ github.repository }}
          PR_NUM:            ${{ github.event.pull_request.number }}
          REVIEW_TEXT:       ${{ steps.review.outputs.text }}
        run: |
          PAYLOAD=$(jq -n \
            --arg review_text "$REVIEW_TEXT" \
            --rawfile diff /tmp/review-diff.txt \
            --arg repo "$PR_REPO" \
            --argjson pr_num "$PR_NUM" \
            '{review_text:$review_text, diff:$diff, repo:$repo, pr_number:$pr_num}')

          HTTP_RESPONSE=$(curl -s -w "\n%{http_code}" --max-time 60 --retry 2 --retry-delay 5 \
            -X POST "${REVIEW_SERVER_URL}/review/rebuttal" \
            -H "Content-Type: application/json" \
            -H "x-review-secret: ${REVIEW_SECRET}" \
            -H "x-github-repo: ${PR_REPO}" \
            -d "$PAYLOAD")

          HTTP_BODY=$(echo "$HTTP_RESPONSE" | head -n -1)
          HTTP_CODE=$(echo "$HTTP_RESPONSE" | tail -n 1)

          if [ "$HTTP_CODE" = "200" ]; then
            REBUTTAL_TEXT=$(echo "$HTTP_BODY" | jq -r '.rebuttal // empty')
            if [ -n "$REBUTTAL_TEXT" ]; then
              {
                echo "rebuttal<<REBUTTAL_EOF"
                echo "$REBUTTAL_TEXT"
                echo "REBUTTAL_EOF"
              } >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Post Rebuttal Comment
        if: steps.rebuttal.outputs.rebuttal != ''
        uses: actions/github-script@v7
        env:
          REBUTTAL_TEXT: ${{ steps.rebuttal.outputs.rebuttal }}
        with:
          script: |
            const body = [
              "## ⚖️ @sparta AI 리뷰 반박",
              "",
              process.env.REBUTTAL_TEXT,
              "",
              "---",
              "> *AI 리뷰도 틀릴 수 있습니다. 위 반박 역시 참고용이며, 최종 판단은 직접 하세요.*"
            ].join("\n");
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body
            });

  conversation:
    if: >
      (github.event_name == 'issue_comment' ||
       github.event_name == 'pull_request_review_comment') &&
      github.event.comment.user.type != 'Bot'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Check @sparta mention
        id: check
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          BODY="$COMMENT_BODY"
          if echo "$BODY" | grep -q '@sparta'; then
            CLEANED=$(echo "$BODY" | sed 's/@sparta[[:space:]]*//')
            if [ -n "$CLEANED" ] && [ "$CLEANED" != " " ]; then
              echo "skip=false" >> "$GITHUB_OUTPUT"
              {
                echo "question<<QUESTION_EOF"
                echo "$CLEANED"
                echo "QUESTION_EOF"
              } >> "$GITHUB_OUTPUT"
            else
              echo "skip=true" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: React to mention
        if: steps.check.outputs.skip == 'false'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const commentId = context.payload.comment.id;
            const eventType = context.eventName;
            if (eventType === 'issue_comment') {
              await github.rest.reactions.createForIssueComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: commentId,
                content: 'eyes'
              });
            } else {
              await github.rest.reactions.createForPullRequestReviewComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: commentId,
                content: 'eyes'
              });
            }

      - name: Get PR info
        if: steps.check.outputs.skip == 'false'
        id: pr-info
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request?.number
              || context.payload.issue?.number;

            const prTitle = context.payload.pull_request?.title || '';
            const prAuthor = context.payload.pull_request?.user?.login
              || context.payload.comment?.user?.login || '';

            // PR diff 조회
            let diff = '';
            try {
              const { data } = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                mediaType: { format: 'diff' }
              });
              diff = typeof data === 'string' ? data : JSON.stringify(data);
            } catch (e) {
              core.warning('Failed to fetch PR diff: ' + e.message);
            }

            // 기존 봇 리뷰 코멘트 조회
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              per_page: 100
            });

            const botReviews = comments
              .filter(c => c.user.type === 'Bot' && c.body.includes('AI 코드리뷰'))
              .map(c => c.body)
              .slice(-5);

            // 대화 히스토리 (이전 @sparta Q&A)
            const userQuestions = comments
              .filter(c => c.user.type !== 'Bot' && c.body.includes('@sparta'))
              .map(c => ({ user: c.user.login, question: c.body.replace('@sparta', '').trim(), time: c.created_at }))
              .slice(-10);

            const botReplies = comments
              .filter(c => c.user.type === 'Bot' && c.body.includes('AI 답변'))
              .map(c => c.body)
              .slice(-10);

            const history = userQuestions.map((q, i) => ({
              ...q,
              answer: botReplies[i] || ''
            }));

            core.setOutput('pr_number', String(prNumber));
            core.setOutput('pr_title', prTitle);
            core.setOutput('pr_author', prAuthor);
            core.setOutput('diff', diff);
            core.setOutput('review_comments', JSON.stringify(botReviews));
            core.setOutput('history', JSON.stringify(history));

      - name: Request conversation
        if: steps.check.outputs.skip == 'false'
        id: conv
        env:
          REVIEW_SERVER_URL: ${{ secrets.REVIEW_SERVER_URL }}
          REVIEW_SECRET: ${{ secrets.REVIEW_SECRET }}
          QUESTION: ${{ steps.check.outputs.question }}
          DIFF: ${{ steps.pr-info.outputs.diff }}
          REVIEW_COMMENTS: ${{ steps.pr-info.outputs.review_comments }}
          HISTORY: ${{ steps.pr-info.outputs.history }}
          PR_NUMBER: ${{ steps.pr-info.outputs.pr_number }}
          PR_TITLE: ${{ steps.pr-info.outputs.pr_title }}
          PR_AUTHOR: ${{ steps.pr-info.outputs.pr_author }}
          COMMENT_TYPE: ${{ github.event_name }}
          GITHUB_REPO: ${{ github.repository }}
        run: |
          # diff를 임시 파일로 저장
          printf '%s' "$DIFF" > /tmp/conv-diff.txt

          PAYLOAD=$(jq -n \
            --arg question "$QUESTION" \
            --rawfile diff /tmp/conv-diff.txt \
            --arg repo "$GITHUB_REPO" \
            --argjson pr_num "$PR_NUMBER" \
            --arg pr_title "$PR_TITLE" \
            --arg pr_author "$PR_AUTHOR" \
            --arg comment_type "$COMMENT_TYPE" \
            --arg review_comments "$REVIEW_COMMENTS" \
            --arg conversation_history "$HISTORY" \
            '{question:$question, diff:$diff, repo:$repo, pr_number:$pr_num, pr_title:$pr_title, pr_author:$pr_author, comment_type:$comment_type, review_comments:$review_comments, conversation_history:$conversation_history}')

          HTTP_RESPONSE=$(curl -s -w "\n%{http_code}" --max-time 90 \
            -X POST "${REVIEW_SERVER_URL}/review/conversation" \
            -H "Content-Type: application/json" \
            -H "x-review-secret: ${REVIEW_SECRET}" \
            -H "x-github-repo: ${GITHUB_REPO}" \
            -d "$PAYLOAD")

          HTTP_BODY=$(echo "$HTTP_RESPONSE" | head -n -1)
          HTTP_CODE=$(echo "$HTTP_RESPONSE" | tail -n 1)

          if [ "$HTTP_CODE" != "200" ]; then
            echo "::warning::대화 응답 서버 오류 (HTTP $HTTP_CODE)"
            echo "error=⚠️ AI 응답 생성에 실패했습니다. (HTTP ${HTTP_CODE})" >> "$GITHUB_OUTPUT"
          else
            REPLY=$(echo "$HTTP_BODY" | jq -r '.reply // "응답을 가져올 수 없습니다."')
            {
              echo "reply<<CONV_EOF"
              echo "$REPLY"
              echo "CONV_EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Post reply
        if: steps.check.outputs.skip == 'false'
        uses: actions/github-script@v7
        env:
          REPLY: ${{ steps.conv.outputs.reply }}
          ERROR: ${{ steps.conv.outputs.error }}
        with:
          script: |
            const prNumber = context.payload.pull_request?.number
              || context.payload.issue?.number;

            let body;
            if (process.env.ERROR) {
              body = process.env.ERROR;
            } else {
              body = process.env.REPLY + '\n\n---\n> *AI 답변은 참고용입니다.*';
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body
            });
